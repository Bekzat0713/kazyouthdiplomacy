<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
</head>
<body class="login-page">

<header class="header">
  <a href="/" class="logo-wrap">
    <img src="/logo.png" alt="logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<div class="login-card">
  <h1>Вход</h1>
  <p>Доступ к вашему аккаунту</p>

  <form id="loginForm" method="POST" action="/login">
    <input
      id="emailInput"
      type="email"
      name="email"
      placeholder="Email адрес"
      autocomplete="email"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Пароль"
      autocomplete="current-password"
      required
    >

    <button class="btn primary" type="submit">Войти</button>
  </form>

  <p id="authError" class="form-error" style="display:none;"></p>

  <div id="resendWrap" style="display:none; margin-top:14px;">
    <button id="resendButton" class="btn secondary" type="button" style="width:100%;">
      Отправить письмо ещё раз
    </button>
  </div>

  <p style="margin-top:16px;">
    <a href="/forgot-password" style="color:#7dd3fc; text-decoration:none;">
      Забыли пароль?
    </a>
  </p>

  <p style="margin-top:20px;">
    Нет аккаунта?
    <a id="registerLink" href="/register" style="color:#a78bfa; text-decoration:none;">
      Зарегистрироваться
    </a>
  </p>
</div>

<script src="/login.js" defer></script>

</body>
</html>
