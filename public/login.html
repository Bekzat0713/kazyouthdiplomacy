<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Вход - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
</head>
<body class="login-page">

<header class="header">
  <a href="/" class="logo-wrap">
    <img src="/logo.png" alt="logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<div class="login-card">
  <h1>Вход</h1>
  <p>Доступ к аккаунту</p>

  <form id="loginForm" method="POST" action="/login">
    <input
      type="email"
      name="email"
      placeholder="Email адрес"
      autocomplete="email"
      required
    >

    <input
      type="password"
      name="password"
      placeholder="Пароль"
      autocomplete="current-password"
      required
    >

    <button class="btn primary" type="submit">Войти</button>
  </form>

  <p id="authError" class="form-error" style="display:none;"></p>

  <p style="margin-top:20px;">
    Нет аккаунта?
    <a id="registerLink" href="/register" style="color:#a78bfa; text-decoration:none;">
      Зарегистрироваться
    </a>
  </p>
</div>

<script>
  (function () {
    var form = document.getElementById("loginForm");
    var registerLink = document.getElementById("registerLink");
    var mustUseBackendHost =
      window.location.protocol === "file:" ||
      (window.location.port && window.location.port !== "3000");

    if (mustUseBackendHost) {
      form.action = "http://localhost:3000/login";
      if (registerLink) registerLink.href = "http://localhost:3000/register";
    }

    var errorBox = document.getElementById("authError");
    var error = new URLSearchParams(window.location.search).get("error");

    var messages = {
      invalid: "Введите корректный email и пароль.",
      user: "Пользователь с таким email не найден.",
      password: "Неверный пароль.",
      session: "Ошибка сессии. Попробуйте снова.",
      server: "Ошибка сервера или базы данных. Проверьте логи терминала."
    };

    if (error && errorBox) {
      errorBox.textContent = messages[error] || "Ошибка входа.";
      errorBox.style.display = "block";
    }
  })();
</script>

</body>
</html>
