<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
</head>
<body class="register-page">

<header class="header">
  <a href="/" class="logo-wrap">
    <img src="/logo.png" alt="logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<div class="register-card register-card-wide">
  <h1>Создать аккаунт</h1>
  <p class="register-intro">
    Заполните профиль, чтобы мы сразу понимали ваш бэкграунд и учебную среду.
  </p>

  <form id="registerForm" method="POST" action="/register" class="register-form-extended">
    <div class="register-form-grid">
      <input
        type="text"
        name="firstName"
        placeholder="Имя"
        autocomplete="given-name"
        maxlength="80"
        required
      >

      <input
        type="text"
        name="lastName"
        placeholder="Фамилия"
        autocomplete="family-name"
        maxlength="80"
        required
      >

      <input
        id="birthDateInput"
        type="date"
        name="birthDate"
        autocomplete="bday"
        required
      >

      <input
        id="universityInput"
        type="text"
        name="university"
        placeholder="Учебное заведение"
        list="kazakhstanUniversities"
        autocomplete="organization"
        maxlength="180"
        required
      >

      <input
        type="text"
        name="workplace"
        placeholder="Место работы (если есть)"
        autocomplete="organization-title"
        maxlength="180"
      >

      <input
        type="email"
        name="email"
        placeholder="Email адрес"
        autocomplete="email"
        required
      >

      <input
        type="password"
        name="password"
        placeholder="Пароль (минимум 10 символов, буквы и цифры)"
        autocomplete="new-password"
        minlength="10"
        required
      >

      <input
        type="password"
        name="confirmPassword"
        placeholder="Повторите пароль"
        autocomplete="new-password"
        minlength="10"
        required
      >
    </div>

    <datalist id="kazakhstanUniversities"></datalist>

    <p class="register-note">
      В списке собраны вузы Казахстана. Если название не подсказалось, его можно ввести вручную.
    </p>

    <button class="btn primary" type="submit">Зарегистрироваться</button>
  </form>

  <p id="authError" class="form-error" style="display:none;"></p>

  <p style="margin-top:25px; font-size:14px; color:#94a3b8;">
    Уже есть аккаунт?
    <a id="loginLink" href="/login" style="color:#a78bfa; text-decoration:none;">
      Войти
    </a>
  </p>
</div>

<script src="/kazakhstan-universities.js"></script>
<script>
  (function () {
    var form = document.getElementById("registerForm");
    var loginLink = document.getElementById("loginLink");
    var birthDateInput = document.getElementById("birthDateInput");
    var universityInput = document.getElementById("universityInput");
    var universitiesDatalist = document.getElementById("kazakhstanUniversities");
    var mustUseBackendHost = window.location.protocol === "file:";
    var backendBase = mustUseBackendHost ? "http://localhost:3000" : window.location.origin;

    if (mustUseBackendHost) {
      form.action = backendBase + "/register";
      if (loginLink) loginLink.href = backendBase + "/login";
    }

    if (birthDateInput) {
      var today = new Date();
      var yyyy = today.getFullYear();
      var mm = String(today.getMonth() + 1).padStart(2, "0");
      var dd = String(today.getDate()).padStart(2, "0");
      birthDateInput.max = yyyy + "-" + mm + "-" + dd;
    }

    if (universitiesDatalist && Array.isArray(window.KAZAKHSTAN_UNIVERSITIES)) {
      window.KAZAKHSTAN_UNIVERSITIES.forEach(function (universityName) {
        var option = document.createElement("option");
        option.value = universityName;
        universitiesDatalist.appendChild(option);
      });
    }

    var errorBox = document.getElementById("authError");
    var error = new URLSearchParams(window.location.search).get("error");

    var messages = {
      invalid: "Проверьте все поля: имя, фамилию, дату рождения, вуз, место работы, email и пароль.",
      exists: "Пользователь с таким email уже существует.",
      "password-weak": "Пароль должен быть не короче 10 символов и содержать буквы и цифры.",
      "password-match": "Пароль и повтор пароля должны совпадать.",
      "rate-limit": "Слишком много попыток регистрации. Подождите немного и попробуйте снова.",
      server: "Ошибка сервера или базы данных. Проверьте логи терминала."
    };

    form.addEventListener("submit", function (event) {
      var passwordField = form.elements.password;
      var confirmPasswordField = form.elements.confirmPassword;

      if (passwordField && confirmPasswordField && passwordField.value !== confirmPasswordField.value) {
        event.preventDefault();
        if (errorBox) {
          errorBox.textContent = messages["password-match"];
          errorBox.style.display = "block";
        }
        return;
      }

      if (universityInput && !universityInput.value.trim()) {
        event.preventDefault();
        if (errorBox) {
          errorBox.textContent = "Укажите учебное заведение.";
          errorBox.style.display = "block";
        }
      }
    });

    if (error && errorBox) {
      errorBox.textContent = messages[error] || "Ошибка регистрации.";
      errorBox.style.display = "block";
    }
  })();
</script>

</body>
</html>
