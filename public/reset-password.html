<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Новый пароль - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
</head>
<body class="login-page">

<header class="header">
  <a href="/" class="logo-wrap">
    <img src="/logo.png" alt="logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<div class="login-card">
  <h1>Задайте новый пароль</h1>
  <p>Пароль должен быть не короче 10 символов и содержать буквы и цифры.</p>

  <form id="resetPasswordForm" method="POST" action="/reset-password">
    <input id="resetTokenInput" type="hidden" name="token">

    <input
      type="password"
      name="password"
      placeholder="Новый пароль"
      autocomplete="new-password"
      minlength="10"
      required
    >

    <input
      type="password"
      name="confirmPassword"
      placeholder="Повторите новый пароль"
      autocomplete="new-password"
      minlength="10"
      required
    >

    <button class="btn primary" type="submit">Сохранить новый пароль</button>
  </form>

  <p id="resetPasswordMessage" class="form-error" style="display:none;"></p>

  <p style="margin-top:20px;">
    Хотите вернуться назад?
    <a href="/login" style="color:#a78bfa; text-decoration:none;">Ко входу</a>
  </p>
</div>

<script src="/app-config.js"></script>
<script src="/app-runtime.js"></script>
<script src="/reset-password.js" defer></script>

</body>
</html>
