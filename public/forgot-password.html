<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>Восстановление пароля - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
  <link rel="stylesheet" href="/auth.css">
</head>
<body class="forgot-password-page">

<header class="header">
  <a href="/" class="logo-wrap" aria-label="KazYouthDiplomacy">
    <img src="/logo.png" alt="KazYouthDiplomacy logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<main class="auth-centered-main">
  <div class="auth-simple-card">
    <span class="auth-simple-badge">Password reset</span>
    <h1>Восстановление пароля</h1>
    <p>Введите email — мы отправим ссылку для сброса пароля.</p>

    <form id="forgotPasswordForm" method="POST" action="/forgot-password" class="auth-simple-form">
      <label class="auth-simple-field">
        <span>Email</span>
        <input
          id="forgotEmailInput"
          type="email"
          name="email"
          placeholder="you@example.com"
          autocomplete="email"
          required
        >
      </label>

      <button class="auth-simple-submit" type="submit">Отправить ссылку</button>
    </form>

    <p id="forgotPasswordMessage" class="form-error" style="display:none;"></p>

    <p class="auth-simple-back">
      Вспомнили пароль?
      <a href="/login">Вернуться ко входу</a>
    </p>
  </div>
</main>

<script src="/app-config.js"></script>
<script src="/app-runtime.js"></script>
<script src="/forgot-password.js" defer></script>

</body>
</html>
