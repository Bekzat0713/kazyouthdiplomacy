<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>Новый пароль - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
  <link rel="stylesheet" href="/auth.css">
  <link rel="apple-touch-icon" href="/icon-pwa.jpg" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="KazYouth" />
  <link rel="manifest" href="/manifest.json" />
  <script src="/pwa.js" defer></script>
</head>
<body class="reset-password-page">

<header class="header">
  <a href="/" class="logo-wrap" aria-label="KazYouthDiplomacy">
    <img src="/logo.png" alt="KazYouthDiplomacy logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<main class="auth-centered-main">
  <div class="auth-simple-card">
    <span class="auth-simple-badge">New password</span>
    <h1>Задайте новый пароль</h1>
    <p>Пароль должен содержать не менее 10 символов, включая буквы и цифры.</p>

    <form id="resetPasswordForm" method="POST" action="/reset-password" class="auth-simple-form">
      <input id="resetTokenInput" type="hidden" name="token">

      <label class="auth-simple-field">
        <span>Новый пароль</span>
        <input
          type="password"
          name="password"
          placeholder="Минимум 10 символов"
          autocomplete="new-password"
          minlength="10"
          required
        >
      </label>

      <label class="auth-simple-field">
        <span>Повторите пароль</span>
        <input
          type="password"
          name="confirmPassword"
          placeholder="Введите пароль ещё раз"
          autocomplete="new-password"
          minlength="10"
          required
        >
      </label>

      <button class="auth-simple-submit" type="submit">Сохранить новый пароль</button>
    </form>

    <p id="resetPasswordMessage" class="form-error" style="display:none;"></p>

    <p class="auth-simple-back">
      Хотите вернуться назад?
      <a href="/login">Ко входу</a>
    </p>
  </div>
</main>

<script src="/app-config.js"></script>
<script src="/app-runtime.js"></script>
<script src="/reset-password.js" defer></script>

</body>
</html>
