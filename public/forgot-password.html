<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="/logo.png" />
  <title>Восстановление пароля - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
</head>
<body class="login-page">

<header class="header">
  <a href="/" class="logo-wrap">
    <img src="/logo.png" alt="logo">
    <span>KazYouthDiplomacy</span>
  </a>
</header>

<div class="login-card">
  <h1>Восстановление пароля</h1>
  <p>Введите email, и мы отправим ссылку для сброса пароля.</p>

  <form id="forgotPasswordForm" method="POST" action="/forgot-password">
    <input
      id="forgotEmailInput"
      type="email"
      name="email"
      placeholder="Email адрес"
      autocomplete="email"
      required
    >

    <button class="btn primary" type="submit">Отправить ссылку</button>
  </form>

  <p id="forgotPasswordMessage" class="form-error" style="display:none;"></p>

  <p style="margin-top:20px;">
    Вспомнили пароль?
    <a href="/login" style="color:#a78bfa; text-decoration:none;">Вернуться ко входу</a>
  </p>
</div>

<script src="/app-config.js"></script>
<script src="/app-runtime.js"></script>
<script src="/forgot-password.js" defer></script>

</body>
</html>
