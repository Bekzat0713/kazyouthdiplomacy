<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Стажировки - KazYouthDiplomacy</title>
  <link rel="stylesheet" href="/web.css">
</head>
<body data-assistant-page="internships">

<header class="header">
  <a href="/dashboard" class="logo-wrap">
    <img src="/logo.png" alt="KazYouthDiplomacy">
    <span>KazYouthDiplomacy</span>
  </a>
  <nav>
    <a href="/dashboard">Кабинет</a>
    <a href="/opportunities">Возможности</a>
    <a href="/resources">Материалы</a>
    <form method="POST" action="/logout" style="display:inline;">
      <button class="nav-btn">Выйти</button>
    </form>
  </nav>
</header>

<section class="internships-page">
  <section class="internships-hero">
    <div class="internships-hero-top">
      <p id="internshipsSummaryPill" class="internships-summary-pill">Стажировки загружаются...</p>
      <button id="toggleInternshipForm" class="btn primary internships-add-btn" type="button" hidden>
        <span class="internships-add-btn-icon" aria-hidden="true">+</span>
        <span>Добавить объявление</span>
      </button>
    </div>

    <div class="internships-header">
      <h1>Стажировки</h1>
      <p>Актуальные объявления и быстрый способ добавить новое предложение на платформу.</p>
    </div>

    <section id="internshipsDiscoveryPanel" class="internships-discovery-panel" aria-label="Поиск и фильтры стажировок">
      <div class="internships-search-row">
        <label class="internships-search-shell" for="internshipSearchInput">
          <span class="internships-search-icon" aria-hidden="true"></span>
          <input
            id="internshipSearchInput"
            class="internships-search-input"
            type="search"
            placeholder="Поиск стажировок..."
            autocomplete="off"
          >
        </label>

        <div class="internships-search-actions">
          <button id="internshipsFilterToggle" class="internships-toolbar-btn" type="button" aria-expanded="true">
            <span class="internships-toolbar-icon internships-toolbar-icon-filter" aria-hidden="true"></span>
            <span>Фильтры</span>
          </button>

          <div class="internships-view-switch" aria-label="Вид списка">
            <button id="internshipsGridViewBtn" class="internships-view-btn active" type="button" aria-label="Вид сеткой" aria-pressed="true">
              <span class="internships-toolbar-icon internships-toolbar-icon-grid" aria-hidden="true"></span>
            </button>
            <button id="internshipsListViewBtn" class="internships-view-btn" type="button" aria-label="Вид списком" aria-pressed="false">
              <span class="internships-toolbar-icon internships-toolbar-icon-list" aria-hidden="true"></span>
            </button>
          </div>
        </div>
      </div>

      <div id="internshipFiltersWrap" class="internships-filter-wrap">
        <div class="filters-modern internships-filter-chips" id="internshipFilters">
          <button class="filter internships-filter-chip active" type="button" data-category="all">
            <span class="internships-filter-chip-label">Все</span>
            <span class="internships-filter-chip-count" data-filter-count="all">0</span>
          </button>
          <button class="filter internships-filter-chip" type="button" data-category="kazakhstan">
            <span class="internships-filter-chip-label">Казахстан</span>
            <span class="internships-filter-chip-count" data-filter-count="kazakhstan">0</span>
          </button>
          <button class="filter internships-filter-chip" type="button" data-category="international">
            <span class="internships-filter-chip-label">Зарубеж</span>
            <span class="internships-filter-chip-count" data-filter-count="international">0</span>
          </button>
          <button class="filter internships-filter-chip" type="button" data-category="online">
            <span class="internships-filter-chip-label">Онлайн</span>
            <span class="internships-filter-chip-count" data-filter-count="online">0</span>
          </button>
        </div>

        <div class="internships-advanced-filters" aria-label="Дополнительные фильтры">
          <label class="internships-advanced-field">
            <span>Уровень</span>
            <select id="internshipLevelFilter" class="internships-advanced-input">
              <option value="all">Любой</option>
              <option value="no_experience">Без опыта</option>
              <option value="with_experience">С опытом</option>
            </select>
          </label>

          <label class="internships-advanced-field internships-advanced-field-wide">
            <span>Сфера деятельности</span>
            <input
              id="internshipSectorFilter"
              class="internships-advanced-input"
              type="search"
              placeholder="Например: аналитика, право, госслужба"
              autocomplete="off"
            >
          </label>

          <label class="internships-advanced-field">
            <span>Формат</span>
            <select id="internshipFormatFilter" class="internships-advanced-input">
              <option value="all">Любой</option>
              <option value="online">Онлайн</option>
              <option value="offline">Офлайн</option>
            </select>
          </label>
        </div>
      </div>
    </section>
  </section>

  <p id="internshipPageStatus" class="internship-form-status" aria-live="polite"></p>

  <section id="internshipGoalSection" class="goal-focus" hidden>
    <div class="goal-focus-head">
      <div>
        <p class="dashboard-kicker">Для вашей цели</p>
        <h2 id="internshipGoalTitle">Персональная подборка</h2>
      </div>
      <button id="internshipGoalAction" class="btn secondary" type="button">Смотреть рекомендуемое</button>
    </div>
    <p id="internshipGoalDescription" class="goal-focus-description"></p>
    <div id="internshipGoalGrid" class="goal-focus-grid"></div>
  </section>

  <form id="internshipForm" class="internship-form" hidden>
    <h2>Новое объявление</h2>
    <div class="internship-form-grid">
      <input type="text" name="title" placeholder="Название стажировки" required maxlength="140">
      <input type="text" name="organization" placeholder="Организация" required maxlength="120">
      <select name="regionType" required>
        <option value="kazakhstan">Локация: Казахстан</option>
        <option value="international">Локация: Зарубеж</option>
        <option value="online">Локация: Онлайн</option>
      </select>
      <select name="experienceLevel" required>
        <option value="none">Уровень: Без опыта</option>
        <option value="little">Уровень: С опытом</option>
      </select>
      <input type="text" name="sector" placeholder="Сфера деятельности" required maxlength="120">
      <select name="workFormat" required>
        <option value="online">Формат: Онлайн</option>
        <option value="offline">Формат: Офлайн</option>
      </select>
      <select name="category" required>
        <option value="ministries">Министерства</option>
        <option value="akimats">Акиматы</option>
        <option value="quasi">Квазигоссектор</option>
        <option value="online">Онлайн</option>
        <option value="other">Другое</option>
      </select>
      <input type="text" name="location" placeholder="Город / конкретная локация" required maxlength="80">
      <input type="text" name="duration" placeholder="Срок (например, 2 месяца)" required maxlength="60">
      <input type="date" name="deadlineDate" placeholder="Дедлайн">
      <input type="url" name="applyUrl" placeholder="Ссылка для отклика (https://...)">
      <select name="targetGoals" multiple size="5">
        <option value="study_abroad">Поступить за границу</option>
        <option value="masters">Магистратура</option>
        <option value="civil_service">Госслужба</option>
        <option value="international_org">Международные организации</option>
        <option value="national_company">Национальные компании</option>
        <option value="private_sector">Частный сектор</option>
        <option value="undecided">Пока не определился</option>
      </select>
      <select name="requiredEnglishLevel">
        <option value="any">Английский: любой</option>
        <option value="a1_a2">Английский: A1-A2</option>
        <option value="b1_b2">Английский: B1-B2</option>
        <option value="c1_plus">Английский: C1+</option>
      </select>
    </div>
    <textarea name="description" rows="4" placeholder="Краткое описание задач и требований" required maxlength="1000"></textarea>
    <div class="internship-form-actions">
      <button type="submit" class="btn primary">Опубликовать</button>
      <p id="internshipFormStatus" class="internship-form-status" aria-live="polite"></p>
    </div>
  </form>

  <div id="internshipsGrid" class="internships-grid"></div>
  <p id="internshipsEmpty" class="internships-empty" hidden>По выбранному фильтру пока нет объявлений.</p>
</section>

<script src="/internships.js" defer></script>
<script src="/assistant-widget.js" defer></script>
</body>
</html>
